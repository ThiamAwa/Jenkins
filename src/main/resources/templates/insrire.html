<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Inscriptions</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Liste des Inscriptions</h2>

    <form th:action="@{/save}" method="post" th:object="${inscrire}" class="mt-4">
        <div class="mb-3">
            <label class="form-label">Matricule Étudiant :</label>
            <input type="text" th:field="*{matricule}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Nom Complet :</label>
            <input type="text" th:field="*{nomComplet}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Filière :</label>
            <input type="text" th:field="*{filiere}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Niveau :</label>
            <select th:field="*{niveau}" class="form-control" required>
                <option value="">Sélectionnez le niveau</option>
                <option value="Licence 1">Licence 1</option>
                <option value="Licence 2">Licence 2</option>
                <option value="Licence 3">Licence 3</option>
                <option value="Master 1">Master 1</option>
                <option value="Master 2">Master 2</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Année Académique :</label>
            <input type="text" th:field="*{anneeAcad}" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-primary">S'inscrire</button>
    </form>

    <hr />

    <h3>Inscriptions existantes</h3>
    <table class="table table-bordered mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>Matricule</th>
            <th>Nom Complet</th>
            <th>Filière</th>
            <th>Niveau</th>
            <th>Année Académique</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="insc : ${listeInscrpt}">
            <td th:text="${insc.id}"></td>
            <td th:text="${insc.matricule}"></td>
            <td th:text="${insc.nomComplet}"></td>
            <td th:text="${insc.filiere}"></td>
            <td th:text="${insc.niveau}"></td>
            <td th:text="${insc.anneeAcad}"></td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
