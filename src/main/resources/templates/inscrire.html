<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Inscriptions</title>
    <link rel="stylesheet" href="../static/css/bootstrap.min.css" th:href="@{css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Liste des Inscriptions</h2>

    <form th:action="@{/save}" method="post" th:object="${inscrire}" class="mt-4">
        <div class="mb-3">
            <label class="form-label">Matricule Étudiant :</label>
            <input type="text" th:field="*{etudiant.matricule}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Nom :</label>
            <input type="text" th:field="*{etudiant.nom}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Prénom :</label>
            <input type="text" th:field="*{etudiant.prenom}" class="form-control" required />
        </div>
<!--        <div class="mb-3">-->
<!--            <label class="form-label">Filière :</label>-->
<!--            <input type="text" th:field="*{etudiant.filiere}" class="form-control" required />-->
<!--        </div>-->
        <div class="mb-3">
            <label class="form-label">Niveau :</label>
            <select th:field="*{niveau}" class="form-control" required>
                <option value="">Sélectionnez le niveau</option>
                <option value="Licence 1">Licence 1</option>
                <option value="Licence 2">Licence 2</option>
                <option value="Licence 3">Licence 3</option>
                <option value="Master 1">Master 1</option>
                <option value="Master 2">Master 2</option>
            </select>
        </div>
<!--        <div class="mb-3">-->
<!--            <label class="form-label">Année Académique :</label>-->
<!--            <input type="text" th:field="*{AnneAcad}" class="form-control" required />-->
<!--        </div>-->
        <button type="submit" class="btn btn-primary">S'inscrire</button>
    </form>

</div>

<script src="/js/main.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
